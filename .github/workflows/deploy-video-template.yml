name: Deploy Video E2B Template

on:
  workflow_dispatch:
    inputs:
      e2b_access_token:
        description: 'E2B Access Token (leave blank to use the repo E2B_ACCESS_TOKEN secret)'
        required: false
        type: string
      template_name:
        description: 'Template Name'
        required: true
        type: string
        default: 'pipilot-video'
      cpu_count:
        description: 'CPU Cores (video rendering is CPU-bound; Pro plan required for >2)'
        required: false
        type: string
        default: '8'
      memory_mb:
        description: 'Memory in MB (Pro plan required for >4096)'
        required: false
        type: string
        default: '8192'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install E2B CLI
      # npm -g (not `pnpm add`, which pulls the whole Next.js project + fails on
      # ignored build scripts). Pinned to 2.2.4: newer CLIs hard-fail the v1
      # `template build --name --dockerfile` flags. Matches the v4/desktop builds.
      run: npm install -g @e2b/cli@2.2.4

    - name: Build and deploy Video E2B template
      run: |
        # Strip any non-digits (e.g. a "8,192" thousands separator) and default.
        NAME="${{ inputs.template_name }}"; NAME="${NAME:-pipilot-video}"
        CPU="$(printf '%s' "${{ inputs.cpu_count }}" | tr -cd '0-9')"; CPU="${CPU:-8}"
        MEM="$(printf '%s' "${{ inputs.memory_mb }}" | tr -cd '0-9')"; MEM="${MEM:-8192}"
        # Diagnostics: which account + what templates the access token sees.
        echo "== auth =="; e2b auth info 2>&1 || true
        echo "== templates =="; e2b template list 2>&1 || true
        # Idempotent: drop any existing template first so a re-build never 403s
        # with "alias already used". delete-by-alias can 404 while build-by-alias
        # still 403s (the alias resolves differently), so ALSO resolve the numeric
        # template id from the list and delete by that.
        echo "Removing existing '$NAME' template (if any)..."
        e2b template delete "$NAME" -y 2>&1 || true
        TID="$(e2b template list 2>/dev/null | grep -iw "$NAME" | grep -oiE '[a-z0-9]{16,}' | head -1)"
        if [ -n "$TID" ]; then echo "Also deleting by id: $TID"; e2b template delete "$TID" -y 2>&1 || true; fi
        echo "Building '$NAME' with ${CPU} vCPU / ${MEM} MB"
        e2b template build \
          --name "$NAME" \
          --dockerfile e2b-video.Dockerfile \
          --cpu-count "$CPU" \
          --memory-mb "$MEM"
      env:
        E2B_ACCESS_TOKEN: ${{ inputs.e2b_access_token || secrets.E2B_ACCESS_TOKEN }}

    - name: Display template info
      run: |
        echo "Video template deployed: ${{ inputs.template_name }}"
        echo "CPU: ${{ inputs.cpu_count }}  Memory: ${{ inputs.memory_mb }}MB"
        echo ""
        echo "Included:"
        echo "  - Playwright + Chromium (motion-graphics cards + live-app screencast)"
        echo "  - ffmpeg (compositing, Ken Burns, xfade, music mux, encode)"
        echo "  - Zero-API stock corpus at /opt/stockdb (Jamendo moods + Unsplash)"
        echo "  - Storyboard render engine at /opt/pipilot-video/generate.mjs"
        echo ""
        echo "Usage:"
        echo '  const sandbox = await Sandbox.create("${{ inputs.template_name }}")'
        echo '  # PIXABAY_KEY=<user key> node /opt/pipilot-video/generate.mjs storyboard.json'
