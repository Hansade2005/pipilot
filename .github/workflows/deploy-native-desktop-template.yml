name: Deploy PiPilot Native Desktop E2B Template

# Builds pipilot-native-desktop (LIVE native-app preview: XFCE+noVNC + Native SDK).
# Mirrors deploy-desktop-template.yml. Boots noVNC via -c "/start_command.sh".
on:
  workflow_dispatch:
    inputs:
      e2b_access_token:
        description: 'E2B Access Token (leave blank to use the repo E2B_ACCESS_TOKEN secret)'
        required: false
        type: string
      template_name:
        description: 'Template Name'
        required: true
        type: string
        default: 'pipilot-native-desktop'
      cpu_count:
        description: 'CPU Cores (default: 2, Pro plan required for >2)'
        required: false
        type: string
        default: '2'
      memory_mb:
        description: 'Memory in MB (default: 4096, Pro plan required for >4096)'
        required: false
        type: string
        default: '4096'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install E2B CLI
      run: npm install -g @e2b/cli@2.2.4

    - name: Build and deploy PiPilot native-desktop E2B template
      run: |
        NAME="${{ inputs.template_name }}"; NAME="${NAME:-pipilot-native-desktop}"
        CPU="$(printf '%s' "${{ inputs.cpu_count }}" | tr -cd '0-9')"; CPU="${CPU:-2}"
        MEM="$(printf '%s' "${{ inputs.memory_mb }}" | tr -cd '0-9')"; MEM="${MEM:-4096}"
        echo "=== Existing templates (diagnostic — ownership under THIS token) ==="
        e2b template list || true
        echo "==================================================================="
        echo "Removing existing '$NAME' template by alias (if owned by this token)..."
        e2b template delete "$NAME" -y || true
        # Fallback: alias-delete 404s when the CLI can't map alias->id, yet the alias stays
        # reserved and the build then 403s "already used". Resolve id(s) from the listing and
        # delete by id too. The diagnostic list above shows the real format if this misses.
        for ID in $(e2b template list 2>/dev/null | grep -w "$NAME" | grep -oE '[A-Za-z0-9]{16,}' || true); do
          echo "Deleting by resolved id: $ID"; e2b template delete "$ID" -y || true
        done
        echo "Building '$NAME' with ${CPU} vCPU / ${MEM} MB"
        e2b template build \
          --name "$NAME" \
          --dockerfile e2b-native-desktop.Dockerfile \
          --cpu-count "$CPU" \
          --memory-mb "$MEM" \
          -c "/start_command.sh"
      env:
        E2B_ACCESS_TOKEN: ${{ inputs.e2b_access_token || secrets.E2B_ACCESS_TOKEN }}

    - name: Display template info
      run: |
        echo "PiPilot native-desktop template deployed: ${{ inputs.template_name }}"
        echo "  - Ubuntu 24.04 + XFCE + Xvfb + x11vnc + noVNC on port 6080"
        echo "  - Native SDK toolchain (GTK4 + WebKitGTK 6.0 + @native-sdk/cli + warm Zig build)"
        echo "Start command: /start_command.sh"
        echo 'Usage: const d = await DesktopSandbox.create("pipilot-native-desktop")  // then `native dev` on DISPLAY=:0'
