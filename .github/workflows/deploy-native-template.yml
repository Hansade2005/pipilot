name: Deploy PiPilot Native E2B Template

# Builds the pipilot-native E2B sandbox template (Native SDK authoring runtime).
# Mirrors deploy-v4-template.yml. Needs the repo E2B_ACCESS_TOKEN secret.
on:
  workflow_dispatch:
    inputs:
      e2b_access_token:
        description: 'E2B Access Token (leave blank to use the repo E2B_ACCESS_TOKEN secret)'
        required: false
        type: string
      template_name:
        description: 'Template Name'
        required: true
        type: string
        default: 'pipilot-native'
      cpu_count:
        description: 'CPU Cores (default: 2, Pro plan required for >2)'
        required: false
        type: string
        default: '2'
      memory_mb:
        description: 'Memory in MB (default: 4096, Pro plan required for >4096)'
        required: false
        type: string
        default: '4096'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install E2B CLI
      # Pinned to 2.2.4 (same as v4): newer CLIs hard-fail the v1
      # `template build --name --dockerfile` flags.
      run: npm install -g @e2b/cli@2.2.4

    - name: Build and deploy PiPilot native E2B template
      run: |
        NAME="${{ inputs.template_name }}"; NAME="${NAME:-pipilot-native}"
        CPU="$(printf '%s' "${{ inputs.cpu_count }}" | tr -cd '0-9')"; CPU="${CPU:-2}"
        MEM="$(printf '%s' "${{ inputs.memory_mb }}" | tr -cd '0-9')"; MEM="${MEM:-4096}"
        echo "=== Existing templates (diagnostic — ownership under THIS token) ==="
        e2b template list || true
        echo "==================================================================="
        echo "Removing existing '$NAME' template by alias (if owned by this token)..."
        e2b template delete "$NAME" -y || true
        # Fallback: alias-delete 404s when the CLI can't map alias->id, yet the alias stays
        # reserved and the build then 403s "already used". Resolve id(s) from the listing and
        # delete by id too. The diagnostic list above shows the real format if this misses.
        for ID in $(e2b template list 2>/dev/null | grep -w "$NAME" | grep -oE '[A-Za-z0-9]{16,}' || true); do
          echo "Deleting by resolved id: $ID"; e2b template delete "$ID" -y || true
        done
        echo "Building '$NAME' with ${CPU} vCPU / ${MEM} MB"
        e2b template build \
          --name "$NAME" \
          --dockerfile e2b-native.Dockerfile \
          --cpu-count "$CPU" \
          --memory-mb "$MEM"
      env:
        E2B_ACCESS_TOKEN: ${{ inputs.e2b_access_token || secrets.E2B_ACCESS_TOKEN }}

    - name: Display template info
      run: |
        echo "PiPilot native template deployed: ${{ inputs.template_name }}"
        echo "Included: Ubuntu 24.04 + GTK4/WebKitGTK6 + Node 22 + @native-sdk/cli@0.5.4 + gh"
        echo "Warm: Zig 0.16 toolchain + counter starter prebuilt in /home/user/project"
        echo 'Usage: const sandbox = await Sandbox.create("pipilot-native")'
