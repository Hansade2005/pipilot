name: Deploy E2B Template
on:
  workflow_dispatch:
    inputs:
      e2b_access_token:
        description: 'E2B Access Token (leave blank to use the repo E2B_ACCESS_TOKEN secret)'
        required: false
        type: string
      template_name:
        description: 'Template Name'
        required: true
        type: string
        default: 'pipilot'
      cpu_count:
        description: 'CPU Cores (default: 2, Pro plan required for >2)'
        required: false
        type: string
        default: '2'
      memory_mb:
        description: 'Memory in MB (default: 4096, Pro plan required for >4096)'
        required: false
        type: string
        default: '4096'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    # Pin @e2b/cli@2.2.4: newer CLIs HARD-FAIL the deprecated v1 `template build`
    # (deprecation banner -> exit 1). Use npm -g (not pnpm add -g) so pnpm v10's
    # ignored-build-scripts check doesn't exit non-zero at the repo root.
    - name: Install E2B CLI
      run: npm install -g @e2b/cli@2.2.4
    - name: Build and deploy E2B template
      run: |
        NAME="${{ inputs.template_name }}"; NAME="${NAME:-pipilot}"
        CPU="$(printf '%s' "${{ inputs.cpu_count }}" | tr -cd '0-9')"; CPU="${CPU:-2}"
        MEM="$(printf '%s' "${{ inputs.memory_mb }}" | tr -cd '0-9')"; MEM="${MEM:-4096}"
        echo "Removing existing '$NAME' template alias (if any) so a rebuild never 403s..."
        e2b template delete "$NAME" -y || true
        echo "Building '$NAME' from e2b.Dockerfile with ${CPU} vCPU / ${MEM} MB"
        e2b template build --name "$NAME" --dockerfile e2b.Dockerfile --cpu-count "$CPU" --memory-mb "$MEM"
      env:
        E2B_ACCESS_TOKEN: ${{ inputs.e2b_access_token || secrets.E2B_ACCESS_TOKEN }}
