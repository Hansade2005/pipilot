name: Deploy E2B Template
on:
  workflow_dispatch:
    inputs:
      e2b_access_token:
        description: 'E2B Access Token (from https://e2b.dev/dashboard?tab=personal)'
        required: true
        type: string
      template_name:
        description: 'Template Name'
        required: true
        type: string
        default: 'pipilot'
      cpu_count:
        description: 'CPU Cores (default: 2, Pro plan required for >2)'
        required: false
        type: string
        default: '2'
      memory_mb:
        description: 'Memory in MB (default: 4096, Pro plan required for >4096)'
        required: false
        type: string
        default: '4096'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
    - name: Install E2B CLI
      run: pnpm add -g @e2b/cli
    - name: Build and deploy E2B template
      run: e2b template build --name ${{ inputs.template_name }} --cpu-count ${{ inputs.cpu_count }} --memory-mb ${{ inputs.memory_mb }}
      env:
        E2B_ACCESS_TOKEN: ${{ inputs.e2b_access_token }}
